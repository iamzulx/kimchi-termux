<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b0b0e;
      color: #fafafa;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
    }

    /* ── Background SVG ──────────────────────────────── */
    .bg-svg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Content ──────────────────────────────────────── */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      opacity: 0;
      transform: translateY(-12px);
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .logo-wrap svg {
      height: 40px;
      width: auto;
      display: block;
    }

    /* Card */
    .card {
      background: rgba(28, 28, 36, 0.88);
      border: 1px solid rgba(234, 231, 226, 0.09);
      border-radius: 20px;
      padding: 44px 52px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    }

    .card h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #ef4444;
      line-height: 1.3;
    }

    .card p {
      font-size: 13.5px;
      font-weight: 400;
      color: #a1a1aa;
      line-height: 1.6;
    }

    .card .details {
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 12px;
      color: #fca5a5;
      white-space: pre-wrap;
      word-break: break-word;
      text-align: left;
      background: rgba(239, 68, 68, 0.12);
      border-radius: 10px;
      padding: 12px 14px;
    }

    /* ── Animations ───────────────────────────────────── */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
