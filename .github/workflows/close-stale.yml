name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '30 1 * * *'
permissions:
  issues: write
  pull-requests: write
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-pr-message: 'This PR has been marked as stale because it has not had recent activity. It will be closed tomorrow if no further activity occurs.'
          stale-pr-label: 'stale'
          days-before-pr-stale: 14
          days-before-pr-close: 1
          stale-issue-message: 'This issue has been marked as stale because it has not had recent activity. It will be closed tomorrow if no further activity occurs.'
          stale-issue-label: 'stale'
          days-before-issue-stale: 60
          days-before-issue-close: 1