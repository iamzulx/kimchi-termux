name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: "Create the GitHub release and upload release assets"
        type: boolean
        default: false
      publish_homebrew:
        description: "Update getkimchi/homebrew-tap after publishing the GitHub release (requires publish_github_release)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: ./.github/actions/setup
        with:
          bun: "true"
          playwright: "true"

      - name: Build
        run: pnpm run build

      - name: Check (lint + type check)
        run: pnpm run check

      - name: Test
        run: pnpm run test

  build:
    needs: [checks]
    strategy:
      matrix:
        include:
          - target: bun-darwin-x64
            os: darwin
            arch: amd64
            runner: macos-15-intel
          - target: bun-darwin-arm64
            os: darwin
            arch: arm64
            runner: macos-15
          - target: bun-linux-x64
            os: linux
            arch: amd64
            runner: ubuntu-latest
          - target: bun-linux-arm64
            os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - target: bun-windows-x64
            os: windows
            arch: amd64
            runner: windows-latest

    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('0.0.0-dry-run.{0}', github.sha) }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: ./.github/actions/setup
        with:
          bun: "true"

      - name: Set version from tag
        if: ${{ matrix.os != 'windows' }}
        run: node scripts/set-version.js "$RELEASE_VERSION"

      - name: Set version from tag - windows
        if: ${{ matrix.os == 'windows' }}
        run: node scripts/set-version.js $env:RELEASE_VERSION

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/proxy-helper/go.mod

      - name: Build proxy-helper
        run: node scripts/build-proxy-helper.js --target ${{ matrix.target }}

      - name: Build binary
        run: node scripts/build-binary.js --target ${{ matrix.target }}

      - name: Verify binary architecture
        if: ${{ matrix.os != 'windows' }}
        run: |
          file dist/bin/kimchi
          case "${{ matrix.arch }}" in
            amd64) file dist/bin/kimchi | grep -Eq 'x86[_-]64|x86-64' ;;
            arm64) file dist/bin/kimchi | grep -Eq 'arm64|aarch64' ;;
            *) echo "Unsupported arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac

          file dist/share/kimchi/bin/proxy-helper
          case "${{ matrix.arch }}" in
            amd64) file dist/share/kimchi/bin/proxy-helper | grep -Eq 'x86[_-]64|x86-64' ;;
            arm64) file dist/share/kimchi/bin/proxy-helper | grep -Eq 'arm64|aarch64' ;;
            *) echo "Unsupported arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac

      - name: Verify Windows binary
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          Get-Item dist/bin/kimchi.exe
          Get-Item dist/share/kimchi/bin/proxy-helper.exe

          function Assert-LastExitCode([string]$label) {
            if ($LASTEXITCODE -ne 0) {
              throw "$label failed with exit code $LASTEXITCODE"
            }
          }

          .\dist\bin\kimchi.exe --version
          Assert-LastExitCode "kimchi --version"
          .\dist\bin\kimchi.exe --help
          Assert-LastExitCode "kimchi --help"
          .\dist\share\kimchi\bin\proxy-helper.exe ssh-proxy --help
          Assert-LastExitCode "proxy-helper ssh-proxy --help"

          $env:KIMCHI_API_KEY = "dummy"
          $env:KIMCHI_REMOTE_ENDPOINT = "http://127.0.0.1:9"
          $output = & .\dist\bin\kimchi.exe --ssh-proxy dummy-session 2>&1
          $exitCode = $LASTEXITCODE
          $global:LASTEXITCODE = 0
          $output | Write-Output
          if ($exitCode -eq 0) {
            throw "Expected dummy --ssh-proxy check to fail before connecting to a real API"
          }
          if ($output -match "proxy-helper binary not found") {
            throw "Windows kimchi.exe could not locate the bundled proxy-helper.exe"
          }

      - name: Package release asset
        run: node scripts/package-release-asset.js --os ${{ matrix.os }} --arch ${{ matrix.arch }}

      - name: Verify Windows installer
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        env:
          KIMCHI_ARCHIVE_PATH: kimchi_${{ matrix.os }}_${{ matrix.arch }}.zip
          KIMCHI_INSTALL_DIR: ${{ runner.temp }}\kimchi-install
          KIMCHI_SKIP_PATH_UPDATE: "1"
        run: |
          .\scripts\install.ps1
          & "$env:KIMCHI_INSTALL_DIR\bin\kimchi.exe" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimchi_${{ matrix.os }}_${{ matrix.arch }}
          path: kimchi_${{ matrix.os }}_${{ matrix.arch }}.*

  smoke-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: ./.github/actions/setup
        with:
          bun: "true"

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: kimchi_linux_amd64

      - name: Extract binary into dist/
        run: |
          mkdir -p dist
          tar -xzf kimchi_linux_amd64.tar.gz -C dist

      - name: Smoke tests
        run: pnpm run test:smoke

  release:
    needs: [smoke-test]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.publish_github_release) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum kimchi_*.tar.gz kimchi_*.zip > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/kimchi_*.tar.gz
            artifacts/kimchi_*.zip
            artifacts/checksums.txt
            scripts/install.sh
            scripts/install.ps1
          generate_release_notes: true

  homebrew:
    needs: [release]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '.rc.') && (github.event_name == 'push' || (inputs.publish_github_release && inputs.publish_homebrew)) }}
    runs-on: ubuntu-latest

    steps:
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: kimchi_darwin_amd64
          path: artifacts

      - name: Download remaining artifacts
        uses: actions/download-artifact@v4
        with:
          name: kimchi_darwin_arm64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: kimchi_linux_amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: kimchi_linux_arm64
          path: artifacts

      - name: Compute SHA256 values
        id: sha
        run: |
          echo "darwin_amd64=$(sha256sum artifacts/kimchi_darwin_amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(sha256sum artifacts/kimchi_darwin_arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum artifacts/kimchi_linux_amd64.tar.gz  | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum artifacts/kimchi_linux_arm64.tar.gz  | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: getkimchi/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          path: homebrew-tap

      - name: Update Formula/kimchi.rb
        env:
          VERSION: ${{ github.ref_name }}
          SHA_DARWIN_AMD64: ${{ steps.sha.outputs.darwin_amd64 }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.sha.outputs.linux_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          FORMULA=homebrew-tap/Formula/kimchi.rb
          # Strip leading 'v' from tag (e.g. v1.2.3 → 1.2.3)
          VER="${VERSION#v}"

          sed -i \
            -e "s/^  version \".*\"/  version \"${VER}\"/" \
            -e "/kimchi_darwin_arm64/{n; s/sha256 \".*\"/sha256 \"${SHA_DARWIN_ARM64}\"/}" \
            -e "/kimchi_darwin_amd64/{n; s/sha256 \".*\"/sha256 \"${SHA_DARWIN_AMD64}\"/}" \
            -e "/kimchi_linux_arm64/{n; s/sha256 \".*\"/sha256 \"${SHA_LINUX_ARM64}\"/}" \
            -e "/kimchi_linux_amd64/{n; s/sha256 \".*\"/sha256 \"${SHA_LINUX_AMD64}\"/}" \
            "$FORMULA"

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kimchi.rb
          git commit -m "kimchi ${GITHUB_REF_NAME}"
          git push
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
